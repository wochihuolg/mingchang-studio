name: Build dy-team-chang (Windows)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Windows
        run: pnpm build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: List dist
        shell: bash
        run: ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dy-team-chang-windows-${{ github.run_id }}
          path: dist/*.exe
          retention-days: 7
          compression-level: 8

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXE_FILE=$(ls dist/*.exe 2>/dev/null | head -1)
          if [ -z "$EXE_FILE" ]; then
            echo "No EXE found in dist/, skipping Release creation"
            exit 0
          fi
          TAG_NAME="mingchang-${GITHUB_RUN_ID}"
          echo "Creating release $TAG_NAME with $EXE_FILE"
          gh release create "$TAG_NAME" \
            --title "Mingchang Studio v2.0.0-dev (Build ${GITHUB_RUN_ID})" \
            --notes "## Auto Build\n\n- Based on Cherry Studio\n- OpenAI compatible provider only\n- Build time: $(date -u '+%Y-%m-%d %H:%M UTC')\n- Build ID: ${GITHUB_RUN_ID}" \
            --prerelease \
            "$EXE_FILE"
